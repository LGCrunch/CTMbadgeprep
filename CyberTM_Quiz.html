<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberTM Final Exam Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04080f;
    --surface: #080f1a;
    --surface2: #0d1a2b;
    --border: #142840;
    --border-bright: #1e4060;
    --accent: #00c8ff;
    --accent2: #00ff99;
    --danger: #ff3355;
    --warn: #ffaa00;
    --text: #b8dcf0;
    --text-dim: #4a7090;
    --text-bright: #e8f8ff;
    --glow-blue: 0 0 20px rgba(0,200,255,0.25);
    --glow-green: 0 0 20px rgba(0,255,153,0.25);
    --glow-red: 0 0 20px rgba(255,51,85,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 15% 40%, rgba(0,80,140,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 70%, rgba(0,120,80,0.10) 0%, transparent 45%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0,200,255,0.015) 60px, rgba(0,200,255,0.015) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0,200,255,0.015) 60px, rgba(0,200,255,0.015) 61px);
  }

  /* ── SPLASH ── */
  #splash {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
    animation: fadeIn 0.8s ease;
  }

  .splash-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent2);
    text-transform: uppercase;
    border: 1px solid var(--accent2);
    padding: 5px 16px;
    margin-bottom: 28px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(0,255,153,0.3); }
    50% { box-shadow: 0 0 20px rgba(0,255,153,0.6); }
  }

  .splash-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    color: var(--text-bright);
    line-height: 1.1;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(0,200,255,0.4);
  }

  .splash-title span { color: var(--accent); }

  .splash-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 36px;
  }

  .splash-stats {
    display: flex;
    gap: 40px;
    margin-bottom: 48px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    text-shadow: var(--glow-blue);
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .btn-start {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 16px 48px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
    z-index: 0;
  }

  .btn-start:hover::before { transform: scaleX(1); }
  .btn-start:hover { color: var(--bg); box-shadow: var(--glow-blue); }
  .btn-start span { position: relative; z-index: 1; }

  /* ── QUIZ LAYOUT ── */
  #quiz { display: none; padding: 20px; max-width: 820px; margin: 0 auto; animation: fadeIn 0.5s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }

  .top-title {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .score-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }

  .score-display strong {
    color: var(--accent2);
    font-size: 16px;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 10px rgba(0,200,255,0.5);
  }

  .progress-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
    margin-bottom: 20px;
    position: relative;
    animation: fadeIn 0.35s ease;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .q-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .q-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-bright);
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .q-multi-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--warn);
    letter-spacing: 1px;
    margin-top: 8px;
  }

  /* ── CHOICES ── */
  .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }

  .choice-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    font-family: 'Exo 2', sans-serif;
    font-size: 15px;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    line-height: 1.45;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--text-bright);
    background: rgba(0,200,255,0.06);
    box-shadow: inset 3px 0 0 var(--accent);
  }

  .choice-letter {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    min-width: 18px;
    padding-top: 2px;
  }

  /* Multi-select checked state */
  .choice-btn.selected-multi {
    border-color: var(--accent);
    background: rgba(0,200,255,0.1);
    box-shadow: inset 3px 0 0 var(--accent);
    color: var(--text-bright);
  }

  .choice-btn.correct {
    border-color: var(--accent2) !important;
    background: rgba(0,255,153,0.12) !important;
    color: var(--accent2) !important;
    box-shadow: inset 3px 0 0 var(--accent2), var(--glow-green) !important;
  }

  .choice-btn.wrong {
    border-color: var(--danger) !important;
    background: rgba(255,51,85,0.12) !important;
    color: var(--danger) !important;
    box-shadow: inset 3px 0 0 var(--danger) !important;
  }

  .choice-btn:disabled { cursor: default; }

  /* ── SUBMIT MULTI ── */
  .submit-multi-wrap { margin-top: 14px; }

  .btn-submit-multi {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 10px 28px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-submit-multi:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: var(--glow-blue);
  }

  /* ── EXPLANATION ── */
  .explanation {
    display: none;
    margin-top: 16px;
    background: rgba(0,200,255,0.04);
    border: 1px solid var(--border-bright);
    border-left: 3px solid var(--accent);
    padding: 18px 20px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    animation: fadeIn 0.3s ease;
  }

  .explanation.show { display: block; }

  .exp-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .result-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 3px 10px;
    margin-bottom: 10px;
  }

  .result-badge.correct-badge { color: var(--accent2); border: 1px solid var(--accent2); }
  .result-badge.wrong-badge { color: var(--danger); border: 1px solid var(--danger); }

  /* ── NEXT BUTTON ── */
  .btn-next {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 10px 28px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 14px;
    display: none;
  }

  .btn-next.show { display: inline-block; }

  .btn-next:hover {
    background: var(--accent2);
    color: var(--bg);
    box-shadow: var(--glow-green);
  }

  /* ── RESULTS ── */
  #results { display: none; padding: 40px 20px; max-width: 700px; margin: 0 auto; animation: fadeIn 0.6s ease; text-align: center; }

  .result-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    font-weight: 900;
    color: var(--text-bright);
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(0,200,255,0.4);
  }

  .final-score-ring {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 3px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 32px auto;
    position: relative;
    background: var(--surface);
  }

  .final-score-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) var(--pct), var(--border) 0);
    z-index: -1;
    transition: all 1s ease;
  }

  .final-pct {
    font-family: 'Orbitron', monospace;
    font-size: 2.4rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: var(--glow-blue);
  }

  .final-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }

  .result-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 24px 0 36px;
  }

  .breakdown-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 12px;
    text-align: center;
  }

  .breakdown-num {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .breakdown-num.green { color: var(--accent2); }
  .breakdown-num.red { color: var(--danger); }
  .breakdown-num.blue { color: var(--accent); }

  .breakdown-label { font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }

  .grade-msg {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 28px;
    line-height: 1.6;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
  }

  .btn-restart {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-restart::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
    z-index: 0;
  }

  .btn-restart:hover::before { transform: scaleX(1); }
  .btn-restart:hover { color: var(--bg); box-shadow: var(--glow-blue); }
  .btn-restart span { position: relative; z-index: 1; }

  @media (max-width: 520px) {
    .question-card { padding: 20px 16px; }
    .q-text { font-size: 15px; }
    .choice-btn { font-size: 14px; padding: 12px 14px; }
    .splash-stats { gap: 24px; }
    .result-breakdown { grid-template-columns: repeat(3,1fr); gap: 10px; }
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-badge">Cisco NetAcad</div>
  <h1 class="splash-title">Cyber<span>TM</span><br>Final Exam</h1>
  <p class="splash-sub">// CYBER THREAT MANAGEMENT //</p>
  <div class="splash-stats">
    <div class="stat-box"><div class="stat-num">44</div><div class="stat-label">Questions</div></div>
    <div class="stat-box"><div class="stat-num">∞</div><div class="stat-label">Attempts</div></div>
    <div class="stat-box"><div class="stat-num">100%</div><div class="stat-label">Coverage</div></div>
  </div>
  <button class="btn-start" onclick="startQuiz()"><span>▶ LAUNCH QUIZ</span></button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="top-bar">
    <div class="top-title">// CYBERTM FINAL EXAM</div>
    <div class="score-display">SCORE: <strong id="scoreDisplay">0</strong> / <span id="totalDisplay">0</span></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 44</div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="q-number" id="qNumber">QUESTION 1 OF 44</div>
    <div class="q-text" id="qText"></div>
    <div class="q-multi-hint" id="qHint" style="display:none;">★ SELECT ALL THAT APPLY</div>
    <div class="choices" id="choicesContainer"></div>
    <div class="submit-multi-wrap" id="submitMultiWrap" style="display:none;">
      <button class="btn-submit-multi" onclick="submitMulti()">SUBMIT SELECTION</button>
    </div>
    <div class="explanation" id="explanation">
      <div class="exp-label">// EXPLANATION</div>
      <span id="resultBadge" class="result-badge"></span>
      <div id="expText"></div>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">NEXT QUESTION →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results">
  <p style="font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--text-dim);margin-bottom:16px;">// EXAM COMPLETE //</p>
  <h2 class="result-title">Mission<br>Debrief</h2>
  <div class="final-score-ring" id="scoreRing">
    <div class="final-pct" id="finalPct">0%</div>
    <div class="final-sub" id="finalRaw">0 / 44</div>
  </div>
  <div class="result-breakdown">
    <div class="breakdown-box"><div class="breakdown-num green" id="correctCount">0</div><div class="breakdown-label">Correct</div></div>
    <div class="breakdown-box"><div class="breakdown-num red" id="wrongCount">0</div><div class="breakdown-label">Wrong</div></div>
    <div class="breakdown-box"><div class="breakdown-num blue" id="totalCount">44</div><div class="breakdown-label">Total</div></div>
  </div>
  <div class="grade-msg" id="gradeMsg"></div>
  <button class="btn-restart" onclick="restartQuiz()"><span>↺ RETRY EXAM</span></button>
</div>

<script>
const questions = [
  {
    q: "What are three disclosure exemptions that pertain to the FOIA? (Choose three.)",
    choices: [
      "Law enforcement records that implicate one of a set of enumerated concerns",
      "Information specifically non-exempt by statute",
      "Confidential business information",
      "Non-geological information regarding wells",
      "National security and foreign policy information",
      "Public information from financial institutions"
    ],
    correct: [0, 2, 4],
    multi: true,
    exp: "The nine FOIA exemptions include: national security and foreign policy information, internal personnel rules, information specifically exempted by statute, confidential business information, inter/intra-agency communications, personal privacy information, law enforcement records (enumerated concerns), agency info from financial institutions, and geological info concerning wells."
  },
  {
    q: "A company is developing security policies. Which security policy would address the rules that determine access to and use of network resources and define the consequences of policy violations?",
    choices: ["Data policy", "Remote access policy", "Acceptable use policy", "Password policy"],
    correct: [2],
    multi: false,
    exp: "An acceptable use policy highlights a set of rules that determine access to and use of network resources. It may also define the consequences of policy violations."
  },
  {
    q: "Which framework should be recommended for establishing a comprehensive information security management system in an organization?",
    choices: ["ISO/IEC 27000", "ISO OSI model", "CIA Triad", "NIST/NICE framework"],
    correct: [0],
    multi: false,
    exp: "ISO/IEC 27000 is the framework used for establishing a comprehensive information security management system (ISMS) in an organization."
  },
  {
    q: "If a person knowingly accesses a government computer without permission, what federal act laws would the person be subject to?",
    choices: ["SOX", "ECPA", "GLBA", "CFAA"],
    correct: [3],
    multi: false,
    exp: "The Computer Fraud and Abuse Act (CFAA) provides the foundation for US laws criminalizing unauthorized access to computer systems."
  },
  {
    q: "What type of security test uses simulated attacks to determine possible consequences of a real threat?",
    choices: ["Penetration testing", "Integrity checking", "Network scanning", "Vulnerability scanning"],
    correct: [0],
    multi: false,
    exp: "Penetration testing uses simulated attacks to determine the possible consequences of successful attacks on the network. Vulnerability scanning finds weaknesses, network scanning discovers resources, and integrity checking detects changes made to systems."
  },
  {
    q: "What are two tasks that can be accomplished with the Nmap and Zenmap network tools? (Choose two.)",
    choices: [
      "Identification of Layer 3 protocol support on hosts",
      "Password recovery",
      "TCP and UDP port scanning",
      "Validation of IT system configuration",
      "Password auditing"
    ],
    correct: [0, 2],
    multi: true,
    exp: "Nmap and Zenmap can perform port scanning (TCP and UDP) and identify Layer 3 protocols running on a system. L0phtcrack is used for password auditing and recovery."
  },
  {
    q: "Which network security tool can detect open TCP and UDP ports on most versions of Microsoft Windows?",
    choices: ["L0phtcrack", "Zenmap", "SuperScan", "Nmap"],
    correct: [2],
    multi: false,
    exp: "SuperScan is a Microsoft port scanning software that detects open TCP and UDP ports on systems. Nmap and Zenmap are low-level network scanners available to the public. L0phtcrack is used for password auditing and recovery."
  },
  {
    q: "What three security tools does Cisco Talos maintain security incident detection rule sets for? (Choose three.)",
    choices: ["ClamAV", "Snort", "Socat", "NetStumbler", "SpamCop"],
    correct: [0, 1, 4],
    multi: true,
    exp: "Talos maintains the security incident detection rule sets for Snort.org, ClamAV, and SpamCop network security tools."
  },
  {
    q: "What is a characteristic of CybOX?",
    choices: [
      "It is the specification for an application layer protocol that allows the communication of CTI over HTTPS.",
      "It enables the real-time exchange of cyberthreat indicators between the U.S. Federal Government and the private sector.",
      "It is a set of standardized schemata for specifying, capturing, characterizing, and communicating events and properties of network operations.",
      "It is a set of specifications for exchanging cyberthreat information between organizations."
    ],
    correct: [2],
    multi: false,
    exp: "CybOX is an open standards set of standardized schemata for specifying, capturing, characterizing, and communicating events and properties of network operations that support many cybersecurity functions."
  },
  {
    q: "Which security organization maintains a list of common vulnerabilities and exposures (CVE) and is used by prominent security organizations?",
    choices: ["CIS", "SecurityNewsWire", "MITRE", "SANS"],
    correct: [2],
    multi: false,
    exp: "The MITRE Corporation maintains a list of common vulnerabilities and exposures (CVE) used by prominent security organizations."
  },
  {
    q: "What network security organization maintains the NewsBites weekly digest?",
    choices: ["MITRE", "CIS", "SANS", "(ISC)2"],
    correct: [2],
    multi: false,
    exp: "The SysAdmin, Audit, Network, Security (SANS) Institute maintains NewsBites, the weekly digest of news articles about computer security."
  },
  {
    q: "A network administrator is creating a network profile to generate a network baseline. What is included in the critical asset address space element?",
    choices: [
      "The IP addresses or the logical location of essential systems or data",
      "The time between the establishment of a data flow and its termination",
      "The TCP and UDP daemons and ports that are allowed to be open on the server",
      "The list of TCP or UDP processes that are available to accept data"
    ],
    correct: [0],
    multi: false,
    exp: "Critical asset address space refers to the IP addresses or the logical location of essential systems or data. Session duration is the time between flow establishment and termination. Ports used is the list of TCP/UDP processes available to accept data."
  },
  {
    q: "When a server profile for an organization is being established, which element describes the TCP and UDP daemons and ports that are allowed to be open on the server?",
    choices: ["Service accounts", "Listening ports", "Software environment", "Critical asset address space"],
    correct: [1],

let currentQ = 0;
let score = 0;
let answered = 0;
let selectedMulti = new Set();

function startQuiz() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('totalDisplay').textContent = questions.length;
  loadQuestion();
}

function loadQuestion() {
  const q = questions[currentQ];
  selectedMulti.clear();

  document.getElementById('qNumber').textContent = `QUESTION ${currentQ + 1} OF ${questions.length}`;
  document.getElementById('qText').textContent = q.q;

  const hint = document.getElementById('qHint');
  hint.style.display = q.multi ? 'block' : 'none';

  const submitWrap = document.getElementById('submitMultiWrap');
  submitWrap.style.display = q.multi ? 'block' : 'none';

  const exp = document.getElementById('explanation');
  exp.classList.remove('show');

  const btnNext = document.getElementById('btnNext');
  btnNext.classList.remove('show');

  const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
  const container = document.getElementById('choicesContainer');
  container.innerHTML = '';

  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.index = i;
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span><span>${choice}</span>`;

    if (q.multi) {
      btn.onclick = () => toggleMulti(btn, i);
    } else {
      btn.onclick = () => answerSingle(i);
    }

    container.appendChild(btn);
  });

  updateProgress();
}

function toggleMulti(btn, idx) {
  if (selectedMulti.has(idx)) {
    selectedMulti.delete(idx);
    btn.classList.remove('selected-multi');
  } else {
    selectedMulti.add(idx);
    btn.classList.add('selected-multi');
  }
}

function submitMulti() {
  const q = questions[currentQ];
  const correct = new Set(q.correct);
  const selected = selectedMulti;

  const isCorrect = selected.size === correct.size &&
    [...selected].every(i => correct.has(i));

  if (isCorrect) score++;
  answered++;

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const i = parseInt(btn.dataset.index);
    if (correct.has(i)) btn.classList.add('correct');
    else if (selected.has(i) && !correct.has(i)) btn.classList.add('wrong');
  });

  document.getElementById('submitMultiWrap').style.display = 'none';
  showExplanation(isCorrect, q.exp);
  document.getElementById('scoreDisplay').textContent = score;
}

function answerSingle(idx) {
  const q = questions[currentQ];
  const isCorrect = q.correct[0] === idx;

  if (isCorrect) score++;
  answered++;

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const i = parseInt(btn.dataset.index);
    if (i === q.correct[0]) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  showExplanation(isCorrect, q.exp);
  document.getElementById('scoreDisplay').textContent = score;
}

function showExplanation(isCorrect, expText) {
  const exp = document.getElementById('explanation');
  const badge = document.getElementById('resultBadge');
  document.getElementById('expText').textContent = expText;

  badge.textContent = isCorrect ? '✓ CORRECT' : '✗ INCORRECT';
  badge.className = 'result-badge ' + (isCorrect ? 'correct-badge' : 'wrong-badge');
  exp.classList.add('show');

  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = currentQ + 1 < questions.length ? 'NEXT QUESTION →' : 'SEE RESULTS →';
  btnNext.classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ < questions.length) {
    loadQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResults();
  }
}

function updateProgress() {
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentQ} / ${questions.length}`;
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  const results = document.getElementById('results');
  results.style.display = 'block';

  const pct = Math.round((score / questions.length) * 100);
  const wrong = questions.length - score;

  document.getElementById('finalPct').textContent = pct + '%';
  document.getElementById('finalRaw').textContent = `${score} / ${questions.length}`;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('totalCount').textContent = questions.length;

  const ring = document.getElementById('scoreRing');
  ring.style.setProperty('--pct', `${pct}% `);

  let msg = '';
  if (pct >= 90) msg = "Outstanding performance. You've demonstrated mastery of Cyber Threat Management concepts. You're ready for the real exam.";
  else if (pct >= 80) msg = "Strong result. You have a solid grasp of most CTM topics. Review any missed questions and you'll be well prepared.";
  else if (pct >= 70) msg = "Good foundation. Focus on reviewing the questions you missed — a few more study sessions and you'll be exam-ready.";
  else if (pct >= 60) msg = "Passing territory. Keep studying — pay particular attention to risk management frameworks, CVSS metrics, and the Cyber Kill Chain.";
  else msg = "More study time needed. Review your course materials, focusing on security controls, vulnerability management, and incident response stakeholders.";

  document.getElementById('gradeMsg').textContent = msg;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  currentQ = 0;
  score = 0;
  answered = 0;
  selectedMulti.clear();
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('scoreDisplay').textContent = '0';
  loadQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
